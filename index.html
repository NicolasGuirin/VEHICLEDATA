<!DOCTYPE html>
<html lang="es">
<head>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!--titulo de la pestaña-->
    <title>VehicleData</title>
    <!--vinculo con el css-->
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

</head>
<body>
    
    <!--titulo de la pagina-->
    <h1>VehicleData</h1>
    
    <!--barra de busqueda-->
    <input 
        type="text" 
        id="buscador" 
        placeholder="Buscar un vehículo...">
    
    <!--filtros de busqueda-->
    <div class="contenedor-filtros">
        
        <!--botones filtros-->
        <button data-marca="Todas">Todas</button>
        <button data-marca="Honda">Honda</button>
        <button data-marca="Yamaha">Yamaha</button>
        <button data-marca="Motomel">Motomel</button>
        <button data-marca="Bajaj">Bajaj</button>
        <button data-marca="Gilera">Gilera</button>



    </div>

    <!--tarjetas-->
    <div class="contenedor-tarjetas">

    </div>

    <!--conexion con el js-->
    <script src="js/app.js"></script>

</body>

</html>
